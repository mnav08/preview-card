<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="./design/styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>
  </head>

  <body>
    <main>
      <div class="card-container">
        <figure class="img-container">
          <img
            src="./assets/images/illustration-article.svg"
            alt="article image"
          />
        </figure>

        <div class="text-card">
          <p class="category text-preset-3-bold">Learning</p>
          <small class="text-preset-3">Published 21 Dec 2023</small>
          <h1 class="text-preset-1">HTML & CSS foundations</h1>
          <p class="text-preset-2">
            These languages ar ethe backbone of every webiste, defining
            structure, content, and presentation.
          </p>
        </div>

        <div class="user-profile">
          <figure class="img-container">
            <img src="./assets/images/image-avatar.webp" alt="user avatar" />
          </figure>
          <p class="text-preset-3-bold">Greg Hooper</p>
        </div>
      </div>
    </main>

    <footer>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Moises Navas 👨‍💻</a>.
    </footer>
  </body>
</html>
